<!DOCTYPE>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="description" content="AM">
    <meta name="keywords" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control submit por evento formulario</title>
</head>
<body>
	<script type="text/javascript">
		function valida(campo){
			var bRet = false;
			if (campo.value == "")
				alert("Faltan datos");
			else 	if (!campo.value.match(/^[A-Z]{3,4}[0-9]{6}[A-Z]{3}[0-9]{2}$/))
            		alert("No tiene formato de RFC");
				else
					bRet = true;
			return bRet;
		}
	</script>
	<form>
		 CURP <input type="text" name="txtRFC" maxlength="15" size="15"/>
		<br/>
		<input type="submit" onClick="valida(txtRFC);" value="Ok"/>
	</form>
</body>
</html>
